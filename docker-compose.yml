services:
  # ─── PostgreSQL ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: linguaread-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: linguaread
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linguaread_pass}
      POSTGRES_DB: linguaread
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linguaread"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: linguaread-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── NestJS Backend ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linguaread-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://linguaread:${POSTGRES_PASSWORD:-linguaread_pass}@postgres:5432/linguaread
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      CORS_ORIGIN: http://localhost:5173
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Vite Frontend ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: linguaread-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
